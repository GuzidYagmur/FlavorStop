<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flavor Stop</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/app.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="products-container__wrapper">
      <div class="menu-header">
        <h1 class="heading main-heading">Flavor Stop</h1>
        <button class="theme-toggle" title="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <input type="text" class="search-input" placeholder="Search menu...">
      <div class="section-tabs"></div>
      <div class="products-container"></div>
    </div>

    <div class="cart-container">
      <h1 class="heading cart-heading">Your Cart (0)</h1>
      <div class="empty-cart-container">
        <img src="assets/images/icons/empty-cart-icon.svg" alt="">
        <p>Your added items will appear here</p>
      </div>
    </div>

    <dialog class="modal">
      <div class="modal-content">
        <div class="header">
          <img src="assets/images/icons/check-icon.svg" alt="">
          <h2 class="heading">Order Confirmed</h2>
          <p>We hope you enjoy your food!</p>
        </div>
        <div class="product-list"></div>
        <button class="start-order-btn">Start New Order</button>
      </div>
    </dialog>
  </div>
</body>
</html>
